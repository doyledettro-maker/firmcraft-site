user  nginx;
worker_processes  auto;
worker_rlimit_nofile 8192;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"host":"$host",'
            '"request":"$request",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"referer":"$http_referer",'
            '"agent":"$http_user_agent",'
            '"rt":$request_time,'
            '"upstream":"$upstream_addr",'
            '"upstream_rt":"$upstream_response_time"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # Long bodies for LLM completions and large payloads from Langfuse traces.
    client_max_body_size 32m;
    client_body_buffer_size 128k;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 30s;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ─── Rate limiting ──────────────────────────────────────────────────────
    # LiteLLM: bursty (model calls). Generous burst, modest steady-state.
    limit_req_zone $binary_remote_addr zone=litellm_rl:10m rate=30r/s;
    # Langfuse: trace ingestion can spike; keep it loose.
    limit_req_zone $binary_remote_addr zone=langfuse_rl:10m rate=60r/s;
    # Login/auth surface: tight.
    limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=5r/s;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_perip:10m;

    # ─── SSL defaults ───────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ─── Common security headers (re-applied per server block) ──────────────
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https:; font-src 'self' data:; frame-ancestors 'none';";
    }

    # ─── HTTP → HTTPS redirect + ACME challenge ─────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── litellm.firmcraft.ai → litellm:4000 ────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name litellm.firmcraft.ai;

        ssl_certificate     /etc/letsencrypt/live/litellm.firmcraft.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/litellm.firmcraft.ai/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/litellm.firmcraft.ai/chain.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        limit_conn conn_perip 50;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Health probes — no rate limit so dashboards don't flap.
        location ~ ^/health(/.*)?$ {
            proxy_pass http://litellm:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        location / {
            limit_req zone=litellm_rl burst=60 nodelay;

            proxy_pass http://litellm:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Streaming completions: don't buffer, don't time out mid-token.
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            chunked_transfer_encoding on;
        }
    }

    # ─── langfuse.firmcraft.ai → langfuse:3000 ──────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name langfuse.firmcraft.ai;

        ssl_certificate     /etc/letsencrypt/live/langfuse.firmcraft.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/langfuse.firmcraft.ai/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/langfuse.firmcraft.ai/chain.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        limit_conn conn_perip 50;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location ~ ^/api/public/health$ {
            proxy_pass http://langfuse:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # Tighten auth surface against credential stuffing.
        location ~ ^/api/auth/ {
            limit_req zone=auth_rl burst=10 nodelay;
            proxy_pass http://langfuse:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=langfuse_rl burst=120 nodelay;

            proxy_pass http://langfuse:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }
    }
}
