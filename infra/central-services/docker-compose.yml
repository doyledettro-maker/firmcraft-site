name: firmcraft-central

# Firmcraft central services — LiteLLM + Langfuse on a single CX22 VPS.
# Memory budget: 4GB total. Limits below sum to ~2.4GB, leaving headroom for OS + nginx + bursts.
# Langfuse pinned to v2 (Postgres-only); v3 requires Clickhouse/Redis/S3 which won't fit on CX22.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ─── LiteLLM proxy ──────────────────────────────────────────────────────────
  litellm-db:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: always
    environment:
      POSTGRES_DB: ${LITELLM_DB_NAME}
      POSTGRES_USER: ${LITELLM_DB_USER}
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    networks:
      - central
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LITELLM_DB_USER} -d ${LITELLM_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: always
    depends_on:
      litellm-db:
        condition: service_healthy
      langfuse:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${LITELLM_DB_USER}:${LITELLM_DB_PASSWORD}@litellm-db:5432/${LITELLM_DB_NAME}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      STORE_MODEL_IN_DB: "True"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: http://langfuse:3000
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    expose:
      - "4000"
    networks:
      - central
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
    logging: *default-logging

  # ─── Langfuse (v2 — single container, Postgres-only) ────────────────────────
  langfuse-db:
    image: postgres:16-alpine
    container_name: langfuse-db
    restart: always
    environment:
      POSTGRES_DB: ${LANGFUSE_DB_NAME}
      POSTGRES_USER: ${LANGFUSE_DB_USER}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    networks:
      - central
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER} -d ${LANGFUSE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse
    restart: always
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER}:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/${LANGFUSE_DB_NAME}
      NEXTAUTH_URL: https://${LANGFUSE_DOMAIN}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      AUTH_DISABLE_SIGNUP: ${LANGFUSE_DISABLE_SIGNUP:-true}
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    expose:
      - "3000"
    networks:
      - central
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 768M
    logging: *default-logging

  # ─── Nginx reverse proxy (TLS termination) ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: always
    depends_on:
      - litellm
      - langfuse
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
      - nginx-cache:/var/cache/nginx
    networks:
      - central
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
    logging: *default-logging

networks:
  central:
    name: firmcraft-central
    driver: bridge

volumes:
  litellm-db-data:
    name: firmcraft-litellm-db-data
  langfuse-db-data:
    name: firmcraft-langfuse-db-data
  certbot-webroot:
    name: firmcraft-certbot-webroot
  nginx-cache:
    name: firmcraft-nginx-cache
